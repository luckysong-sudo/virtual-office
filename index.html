<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虚拟办公室 - Virtual Office</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader">
            <div class="loader-text">🏢 虚拟办公室加载中...</div>
            <div class="loader-bar"><div class="loader-fill"></div></div>
        </div>
    </div>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="logo">🏢 虚拟办公室</div>
        <div class="office-stats" id="office-stats">
            <span class="stat-item">👥 员工: <strong>8</strong></span>
            <span class="stat-item">📋 任务: <strong id="task-count">0</strong></span>
            <span class="stat-item">⚡ 效率: <strong id="avg-productivity">--</strong>%</span>
        </div>
        <div class="top-actions">
            <button id="btn-new-task" class="btn btn-primary">➕ 新建任务</button>
            <button id="btn-pause" class="btn btn-secondary">⏸️ 暂停</button>
        </div>
    </header>

    <!-- Main Layout -->
    <div class="main-container">
        <!-- Left Panel: Agent List -->
        <aside class="left-panel">
            <h3>👥 团队成员</h3>
            <div class="agent-list" id="agent-list"></div>
        </aside>

        <!-- Center: Office View -->
        <main class="office-view">
            <div class="office-toolbar">
                <button onclick="zoomIn()" title="放大">🔍+</button>
                <button onclick="zoomOut()" title="缩小">🔍-</button>
                <button onclick="resetView()" title="重置">↺</button>
                <span class="zoom-level" id="zoom-level">100%</span>
            </div>
            <div class="office-canvas" id="office-canvas">
                <!-- Floor plan drawn by JS -->
                <canvas id="floor-plan"></canvas>
                <!-- Agents rendered on top -->
                <div class="agents-layer" id="agents-layer"></div>
                <!-- Conversation bubbles -->
                <div class="bubbles-layer" id="bubbles-layer"></div>
            </div>
        </main>

        <!-- Right Panel: Chat / Agent Detail -->
        <aside class="right-panel" id="right-panel">
            <div class="panel-placeholder" id="panel-placeholder">
                <div class="placeholder-icon">💬</div>
                <p>点击任意角色开始对话</p>
                <p class="hint">或者下达任务指令</p>
            </div>
            <div class="panel-content" id="panel-content" style="display:none;">
                <div class="panel-header" id="panel-header"></div>
                <div class="panel-messages" id="panel-messages"></div>
                <div class="panel-input">
                    <input type="text" id="chat-input" placeholder="输入消息..." />
                    <button id="chat-send" class="btn btn-primary">发送</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- New Task Modal -->
    <div class="modal-overlay" id="modal-task" style="display:none;">
        <div class="modal">
            <h3>📋 新建任务</h3>
            <input type="text" id="task-title" placeholder="任务标题" />
            <textarea id="task-desc" placeholder="任务描述（可选）"></textarea>
            <select id="task-assignee">
                <option value="">不指定分配</option>
            </select>
            <select id="task-priority">
                <option value="low">低优先级</option>
                <option value="medium" selected>中优先级</option>
                <option value="high">高优先级</option>
                <option value="critical">紧急</option>
            </select>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="createTask()">创建</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div class="toast" id="toast" style="display:none;"></div>

    <script src="assets/js/office.js"></script>
</body>
</html>
