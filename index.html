<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 虚拟办公室</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<div id="page-loader" style="position:fixed;inset:0;background:#f0f4f8;display:flex;align-items:center;justify-content:center;z-index:9999;font-size:3rem;">🏢</div>
<script>setTimeout(function(){var l=document.getElementById("page-loader");if(l){l.style.opacity="0";setTimeout(function(){l.remove()},300);}},500);</script>
<body>
    <div id="loading-screen">
        <div class="loader">
            <div class="loader-text">🏢 虚拟办公室加载中...</div>
            <div class="loader-bar"><div class="loader-fill"></div></div>
        </div>
    </div>

    <header class="top-bar">
        <div class="logo">🏢 虚拟办公室</div>
        <div class="office-stats" id="office-stats">
            <span class="stat-item" id="time-display">🕐 00:00</span>
            <span class="stat-item">👥 <strong id="agent-count">8</strong></span>
            <span class="stat-item">📋 <strong id="task-count">0</strong></span>
            <span class="stat-item">⚡ <strong id="avg-productivity">--</strong>%</span>
            <span class="stat-item">😊 <strong id="avg-mood">--</strong></span>
        </div>
        <div class="top-actions">
            <button id="btn-briefing" class="btn btn-purple" title="每日简报 (B)">📊 简报</button>
            <button id="btn-meeting" class="btn btn-info" title="召开会议 (M)">📽️ 会议</button>
            <button id="btn-boss" class="btn btn-warning" title="向全员下达指令 (O)">👑 老板</button>
            <button id="btn-coffee" class="btn btn-secondary" title="喝咖啡休息 (C)">☕ 咖啡</button>
            <button id="btn-new-task" class="btn btn-primary" title="新建任务 (N)">➕ 任务</button>
            <button id="btn-export" class="btn btn-secondary" title="导出报告 (E)">📄 导出</button>
            <button id="btn-shortcuts" class="btn btn-secondary" title="快捷键">⌨️</button>
            <button id="btn-night" class="btn btn-secondary" title="切换日夜">🌙</button>
            <button id="btn-pause" class="btn btn-secondary">⏸️</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="left-panel">
            <h3>👥 团队</h3>
            <div class="agent-list" id="agent-list"></div>
            <div class="event-stream">
                <h3>📡 事件</h3>
                <div id="event-list"></div>
            </div>
        </aside>

        <main class="office-view" id="office-view">
            <div class="office-toolbar">
                <button onclick="zoomIn()">🔍+</button>
                <button onclick="zoomOut()">🔍-</button>
                <button onclick="resetView()">↺</button>
                <span class="zoom-level" id="zoom-level">100%</span>
            </div>
            <div class="office-canvas" id="office-canvas">
                <canvas id="floor-plan"></canvas>
                <div class="agents-layer" id="agents-layer"></div>
                <div class="bubbles-layer" id="bubbles-layer"></div>
                <div class="meeting-overlay" id="meeting-overlay" style="display:none">
                    <div class="meeting-info">
                        <span class="meeting-title">📽️ 会议进行中...</span>
                        <span class="meeting-participants"></span>
                    </div>
                </div>
            </div>
        </main>

        <aside class="right-panel" id="right-panel">
            <div class="panel-placeholder" id="panel-placeholder">
                <div class="placeholder-icon">💬</div>
                <p>点击角色开始对话</p>
                <p class="hint">试试 ☕ 咖啡休息 或 👑 老板模式</p>
                <p class="hint">按 M 开会议 · 按 N 建任务 · 按 E 导报告</p>
            </div>
            <div class="panel-content" id="panel-content" style="display:none;">
                <div class="panel-tabs">
                    <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">💬</button>
                    <button class="tab-btn" data-tab="timeline" onclick="switchTab('timeline')">📜</button>
                    <button class="tab-btn" data-tab="detail" onclick="switchTab('detail')">👤</button>
                    <button class="tab-btn" data-tab="tasks" onclick="switchTab('tasks')">📋</button>
                </div>
                <div class="tab-panel active" id="tab-chat">
                    <div class="panel-header" id="panel-header"></div>
                    <div class="panel-messages" id="panel-messages"></div>
                    <div class="panel-input">
                        <input type="text" id="chat-input" placeholder="输入消息..." />
                        <button id="chat-send" class="btn btn-primary">发送</button>
                    </div>
                </div>
                <div class="tab-panel" id="tab-timeline" style="display:none;">
                    <div class="timeline-content" id="timeline-content"></div>
                </div>
                <div class="tab-panel" id="tab-detail" style="display:none;">
                    <div class="detail-content" id="detail-content"></div>
                </div>
                <div class="tab-panel" id="tab-tasks" style="display:none;">
                    <div class="task-list" id="task-list"></div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modal-task" style="display:none;">
        <div class="modal">
            <h3>📋 新建任务</h3>
            <input type="text" id="task-title" placeholder="任务标题" />
            <textarea id="task-desc" placeholder="描述（可选）"></textarea>
            <select id="task-assignee"><option value="">不指定</option></select>
            <select id="task-priority">
                <option value="low">低</option>
                <option value="medium" selected>中</option>
                <option value="high">高</option>
                <option value="critical">紧急</option>
            </select>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-task')">取消</button>
                <button class="btn btn-primary" onclick="createTask()">创建</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-boss" style="display:none;">
        <div class="modal">
            <h3>👑 老板模式</h3>
            <p>向全体团队成员下达指令，每个人都会给出自己的反应。</p>
            <textarea id="boss-order" placeholder="例如：本季度我们要全力冲刺新版本上线！"></textarea>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-boss')">取消</button>
                <button class="btn btn-warning" onclick="sendBossOrder()">📢 全员传达</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-briefing" style="display:none;">
        <div class="modal" style="width:550px">
            <h3>📊 办公室每日简报</h3>
            <div id="briefing-content"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-briefing')">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-meeting" style="display:none;">
        <div class="modal">
            <h3>📽️ 召开会议</h3>
            <input type="text" id="meeting-title" placeholder="会议主题" />
            <textarea id="meeting-topic" placeholder="会议议题（可选）"></textarea>
            <p style="font-size:.75rem;color:var(--dim)">选择参会人（不选则全员参加）：</p>
            <div class="meeting-participant-select" id="meeting-participant-select"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-meeting')">取消</button>
                <button class="btn btn-info" onclick="startMeeting()">📽️ 开始会议</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-shortcuts" style="display:none;">
        <div class="modal" style="width:400px">
            <h3>⌨️ 快捷键</h3>
            <div class="shortcuts-list">
                <div class="shortcut-row"><span class="shortcut-key">N</span><span class="shortcut-desc">新建任务</span></div>
                <div class="shortcut-row"><span class="shortcut-key">B</span><span class="shortcut-desc">每日简报</span></div>
                <div class="shortcut-row"><span class="shortcut-key">O</span><span class="shortcut-desc">老板模式</span></div>
                <div class="shortcut-row"><span class="shortcut-key">C</span><span class="shortcut-desc">咖啡休息</span></div>
                <div class="shortcut-row"><span class="shortcut-key">M</span><span class="shortcut-desc">召开会议</span></div>
                <div class="shortcut-row"><span class="shortcut-key">E</span><span class="shortcut-desc">导出报告</span></div>
                <div class="shortcut-row"><span class="shortcut-key">ESC</span><span class="shortcut-desc">关闭弹窗</span></div>
                <div class="shortcut-row"><span class="shortcut-key">↑↓</span><span class="shortcut-desc">切换选中角色</span></div>
                <div class="shortcut-row"><span class="shortcut-key">+/-</span><span class="shortcut-desc">缩放地图</span></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('modal-shortcuts')">关闭</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" style="display:none;"></div>

    <script src="assets/js/office.js"></script>

<script>
document.addEventListener("keydown", function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "k") { e.preventDefault(); var si=document.getElementById("searchInput"); if(si)si.focus(); }
    if (e.key === "Escape") { document.querySelectorAll(".modal").forEach(function(el){el.style.display="none";}); }
});
</script>

document.addEventListener("keydown", function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "k") { e.preventDefault(); var si=document.getElementById("searchInput"); if(si)si.focus(); }
    if (e.key === "Escape") { document.querySelectorAll(".modal").forEach(function(el){el.style.display="none";}); }
});
</script>

    if ((e.ctrlKey || e.metaKey) && e.key === "k") { e.preventDefault(); var si=document.getElementById("searchInput"); if(si)si.focus(); }
    if (e.key === "Escape") { document.querySelectorAll(".modal").forEach(function(el){el.style.display="none";}); }
});
</script>
</body>
</html>
